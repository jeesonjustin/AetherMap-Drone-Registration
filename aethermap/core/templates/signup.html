<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - AetherMap</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<style>
    /* Fade-in + slide-up animation */
    .fade-slide-in {
        opacity: 0;
        transform: translateY(30px);
        animation: fadeSlideIn 0.8s ease forwards;
    }

    @keyframes fadeSlideIn {
        from {
            opacity: 0;
            transform: translateY(30px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>


<body class="bg-light d-flex align-items-center justify-content-center vh-100">

    <div class="card shadow-lg p-4 rounded-4 fade-slide-in" style="max-width: 450px; width: 100%;">

        <div class="card-body">
            <h2 class="text-center mb-2 fw-bold">Create an Account</h2>
            <p class="text-center text-muted mb-4">Sign up to get started with AetherMap</p>

            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label for="id_username" class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" id="id_username" required>
                </div>

                <div class="mb-3">
                    <label for="id_email" class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" id="id_email" required>
                </div>

                <div class="mb-3">
                    <label for="id_password1" class="form-label">Password</label>
                    <input type="password" name="password1" class="form-control" id="id_password1" required>
                </div>

                <div class="mb-3">
                    <label for="id_password2" class="form-label">Confirm Password</label>
                    <input type="password" name="password2" class="form-control" id="id_password2" required>
                </div>

                <div class="mb-3">
                    <label for="id_role" class="form-label">Role</label>
                    <select name="role" id="id_role" class="form-select" required>
                        <option value="drone_user">Drone User</option>
                        <option value="service_provider">Service Provider</option>
                        <option value="Farmer">Farmer</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-success w-100 mt-2">Sign Up</button>
            </form>

            <p class="mt-3 small text-center">
                Already have an account?
                <a href="{% url 'login' %}" class="text-decoration-none">Login here</a>
            </p>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
